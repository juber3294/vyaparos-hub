services:
  mysql:
    image: mysql:8.4
    container_name: vyaparos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vyaparos
      MYSQL_USER: vyaparos
      MYSQL_PASSWORD: vyaparos
      MYSQL_ROOT_PASSWORD: vyaparos_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uvyaparos -pvyaparos --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vyaparos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vyaparos-api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: mysql://vyaparos:vyaparos@mysql:3306/vyaparos
      REDIS_URL: redis://redis:6379
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: vyaparos-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
